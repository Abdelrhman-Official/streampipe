name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:   # allows manual trigger from GitHub UI

jobs:
  build-apk:
    name: Build StreamPipe APK
    runs-on: ubuntu-22.04

    steps:
      # ── 1. Checkout code ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python ──────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. Install system dependencies required by Buildozer ──────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            git zip unzip openjdk-17-jdk \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libtinfo5 cmake libffi-dev libssl-dev \
            python3-pip build-essential ccache

      # ── 4. Cache Buildozer global directory (~/.buildozer) ───────────
      - name: Cache Buildozer dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ~/.cache/pip
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      # ── 5. Install Python build tools ─────────────────────────────────
      - name: Install Buildozer & Cython
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      # ── 6. Build the APK ──────────────────────────────────────────────
      - name: Build APK (debug)
        run: |
          buildozer -v android debug
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

      # ── 7. Upload APK as a downloadable artifact ──────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: StreamPipe-APK
          path: bin/*.apk
          retention-days: 30

      # ── 8. Print APK info ─────────────────────────────────────────────
      - name: Show APK details
        run: |
          echo "=== APK Files ==="
          ls -lh bin/*.apk || echo "No APK found"
