name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build StreamPipe APK
    runs-on: ubuntu-22.04

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python ────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. System deps ───────────────────────────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            git zip unzip \
            openjdk-17-jdk \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 \
            cmake libffi-dev libssl-dev \
            python3-pip build-essential ccache

      # ── 4. Pre-accept ALL Android SDK licenses ────────────────────────
      #    Write the known SHA1 hashes that sdkmanager checks for.
      #    This prevents the interactive "Accept? (y/N):" prompt.
      - name: Pre-accept Android SDK licenses
        run: |
          mkdir -p "$HOME/.android"
          # Standard SDK license
          cat > "$HOME/.android/android-sdk-license" <<'EOF'
          8933bad161af4178b1185d1a37fbf41ea5269c55
          d56f5187479451eabf01fb78af6dfcb131a6481e
          24333f8a63b6825ea9c5514f83c2829b004d1fee
          EOF
          # Preview license
          cat > "$HOME/.android/android-sdk-preview-license" <<'EOF'
          84831b9409646a918e30573bab4c9c91346d8abd
          EOF
          # Google Play license
          cat > "$HOME/.android/google-gdk-license" <<'EOF'
          33b6a2b64607f11b759f320ef9dff4ae5c47d97a
          EOF
          echo "License files written:"
          ls -la "$HOME/.android/"

      # ── 5. Cache Buildozer ~/.buildozer ──────────────────────────────
      - name: Cache Buildozer dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ~/.cache/pip
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      # ── 6. Install Buildozer + Cython ────────────────────────────────
      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install buildozer cython virtualenv

      # ── 7. Accept licenses via sdkmanager after any SDK download ──────
      #    Buildozer downloads the SDK on first run; we then re-accept.
      - name: Build APK (debug)
        run: |
          # Auto-accept any sdkmanager prompts that sneak through
          yes | buildozer -v android debug 2>&1 || \
          (echo "First attempt failed, retrying after accepting licenses..." && \
           SDK="$HOME/.buildozer/android/platform/android-sdk" && \
           yes | "$SDK/tools/bin/sdkmanager" --sdk_root="$SDK" --licenses && \
           yes | buildozer -v android debug)
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

      # ── 8. Upload APK artifact ────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: StreamPipe-APK
          path: bin/*.apk
          retention-days: 30

      # ── 9. Print result ───────────────────────────────────────────────
      - name: Show APK details
        run: |
          echo "=== Build complete ==="
          ls -lh bin/*.apk 2>/dev/null || echo "No APK found in bin/"
